name: Node.js CI with Docker Build and Push
on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
         node-version: 18
      - name: Install dependencies
        run: npm install
      - name: Run Unit Tests
        run: npm test

  test-and-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. ล็อกอินเข้า Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Build และ Push (ใช้ชื่อ Image ตามรูปแบบ username/repo:tag)
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # เปลี่ยน 'your-dockerhub-username' เป็นชื่อ user จริง 
          # หรือใช้ ${{ secrets.DOCKERHUB_USERNAME }} ก็ได้ครับ
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/electricity-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/electricity-api:${{ github.sha }}